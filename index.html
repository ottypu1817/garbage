<!doctype html>
<html lang="zh-tw">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>生態掃描控制台</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
  <style>
    :root {
      --bg: linear-gradient(135deg, #0f0f23, #1a1a2e);
      --panel: rgba(26, 26, 46, 0.9);
      --panel-soft: rgba(45, 45, 70, 0.8);
      --ink: #e0e0e0;
      --muted: #a0a0a0;
      --accent: #00d4ff;
      --warn: #ffaa00;
      --success: #00ff88;
      --error: #ff4444;
      --glow: 0 0 10px rgba(0, 212, 255, 0.5);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: 'Orbitron', 'Roboto Mono', monospace;
      background: var(--bg);
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 80%, rgba(0, 212, 255, 0.1) 0%, transparent 50%),
                  radial-gradient(circle at 80% 20%, rgba(255, 170, 0, 0.1) 0%, transparent 50%);
      pointer-events: none;
    }
    .shell {
      width: min(1080px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 16px;
      animation: enter 480ms ease-out;
    }
    .top {
      background: var(--panel);
      border: 1px solid rgba(0, 212, 255, 0.3);
      border-radius: 14px;
      padding: 16px;
      box-shadow: var(--glow);
      backdrop-filter: blur(10px);
      position: relative;
      overflow: hidden;
    }
    .top::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.1), transparent);
      animation: scan 3s infinite;
    }
    h1 {
      margin: 0;
      font-size: clamp(1.3rem, 4vw, 2rem);
    }
    .hint { color: var(--muted); margin-top: 8px; }
    .mode-selector {
      margin-top: 16px;
      display: flex;
      gap: 10px;
    }
    .mode-btn {
      background: var(--panel-soft);
      color: var(--ink);
      border: 1px solid rgba(0, 212, 255, 0.6);
      border-radius: 8px;
      padding: 8px 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Orbitron', monospace;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .mode-btn:hover {
      box-shadow: var(--glow);
      transform: translateY(-2px);
    }
    .mode-btn.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
      box-shadow: 0 0 15px rgba(0, 212, 255, 0.8);
    }
    .grid {
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 16px;
    }
    .box {
      background: var(--panel);
      border: 1px solid rgba(0, 212, 255, 0.3);
      border-radius: 14px;
      padding: 16px;
      box-shadow: var(--glow);
      backdrop-filter: blur(10px);
    }
    .input-section {
      display: none;
    }
    .input-section.active {
      display: block;
    }
    input[type="file"] {
      width: 100%;
      background: var(--panel-soft);
      color: var(--ink);
      border: 1px dashed rgba(0, 212, 255, 0.6);
      border-radius: 10px;
      padding: 10px;
      cursor: pointer;
      transition: border-color 0.3s;
    }
    input[type="file"]:hover {
      border-color: var(--accent);
    }
    .camera-section {
      text-align: center;
    }
    video {
      width: 100%;
      max-width: 400px;
      border-radius: 12px;
      border: 1px solid rgba(0, 212, 255, 0.35);
      box-shadow: var(--glow);
    }
    .action-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 10px;
    }
    .capture-btn {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      cursor: pointer;
      font-size: 1rem;
      font-family: 'Orbitron', monospace;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
    }
    .capture-btn:hover {
      box-shadow: 0 0 15px rgba(0, 212, 255, 0.8);
      transform: scale(1.05);
    }
    .preview {
      margin-top: 14px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(0, 212, 255, 0.35);
      min-height: 220px;
      display: grid;
      place-items: center;
      background: rgba(15, 34, 38, 0.5);
      box-shadow: inset var(--glow);
    }
    .preview img, .preview video {
      max-width: 100%;
      max-height: 360px;
      object-fit: contain;
      display: block;
    }
    .stat {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }
    .row {
      display: grid;
      grid-template-columns: 88px 1fr 58px;
      gap: 8px;
      align-items: center;
      font-size: 0.9rem;
    }
    .bar {
      height: 10px;
      border-radius: 999px;
      background: rgba(36, 63, 69, 0.5);
      overflow: hidden;
      box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.5);
    }
    .bar > i {
      display: block;
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--warn), var(--accent));
      transition: width 300ms ease;
    }
    .best {
      margin-top: 12px;
      border-radius: 10px;
      padding: 12px;
      background: rgba(26, 51, 56, 0.8);
      border-left: 4px solid var(--accent);
      line-height: 1.5;
      box-shadow: var(--glow);
    }
    .sub { color: var(--muted); font-size: 0.85rem; margin-top: 12px; }
    a { color: #a7ffd8; }
    @media (max-width: 860px) {
      .grid { grid-template-columns: 1fr; }
    }
    @keyframes enter {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scan {
      0% { left: -100%; }
      100% { left: 100%; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="top">
      <h1>🚀 生態掃描控制台</h1>
      <div class="hint">上傳垃圾圖片或使用鏡頭辨識，獲取智能分類結果。</div>
      <div class="mode-selector">
        <button class="mode-btn active" id="uploadBtn">📁 照片上傳</button>
        <button class="mode-btn" id="cameraBtn">📷 鏡頭辨識</button>
      </div>
      <div class="sub">歡迎使用智能垃圾分類系統</div>
    </section>

    <section class="grid">
      <article class="box">
        <div class="input-section active" id="uploadSection">
          <label for="imageInput">選擇圖片</label>
          <input id="imageInput" type="file" accept="image/*" />
        </div>
        <div class="input-section" id="cameraSection">
          <div class="camera-section">
            <video id="video" autoplay playsinline></video>
            <div class="action-buttons">
              <button class="capture-btn" id="captureBtn">⚡ 捕捉圖片</button>
              <button class="mode-btn" id="switchCamBtn" style="padding: 10px 20px;">🔁 切換鏡頭</button>
            </div>
          </div>
        </div>
        <div class="preview" id="preview">
          <span class="hint">尚未選擇圖片。</span>
        </div>
      </article>

      <article class="box">
        <strong>🤖 分類面板</strong>
        <div class="stat" id="results"></div>
        <div class="best" id="best">等待模型和圖片輸入...</div>
      </article>
    </section>
  </main>

  <script>
    const MODEL_URL = "./model/model.json";
    const METADATA_URL = "./model/metadata.json";

    // 補充了 metal (金屬) 拼寫檢查，保留 matal 以防模型標籤拼錯
    const labelAlias = {
      glass: "玻璃",
      battery: "電池",
      cardboard: "紙板",
      metal: "金屬",
      matal: "金屬" 
    };

    let model;
    const imageInput = document.getElementById("imageInput");
    const preview = document.getElementById("preview");
    const results = document.getElementById("results");
    const best = document.getElementById("best");
    const uploadBtn = document.getElementById("uploadBtn");
    const cameraBtn = document.getElementById("cameraBtn");
    const uploadSection = document.getElementById("uploadSection");
    const cameraSection = document.getElementById("cameraSection");
    const video = document.getElementById("video");
    const captureBtn = document.getElementById("captureBtn");
    const switchCamBtn = document.getElementById("switchCamBtn");
    
    let stream;
    let facingMode = 'environment'; // 預設使用後鏡頭
    let pendingFile = null;

    function init() {
      if (typeof window.tmImage === 'undefined') {
        setTimeout(init, 100);
        return;
      }
      const tmImage = window.tmImage;

      async function initModel() {
        try {
          best.textContent = "載入模型中...";
          model = await tmImage.load(MODEL_URL, METADATA_URL);
          best.textContent = "模型載入完成。請上傳圖片或使用鏡頭。";
          if (pendingFile) {
            classifyImage(pendingFile);
            pendingFile = null;
          }
        } catch (error) {
          best.textContent = "模型載入失敗: " + error.message;
        }
      }

      function switchMode(mode) {
        if (mode === 'upload') {
          uploadBtn.classList.add('active');
          cameraBtn.classList.remove('active');
          uploadSection.classList.add('active');
          cameraSection.classList.remove('active');
          
          if (stream) {
            stream.getTracks().forEach(track => track.stop());
            stream = null;
          }
          video.style.display = 'none';
          imageInput.value = '';
          preview.innerHTML = '<span class="hint">尚未選擇圖片。</span>';
          results.innerHTML = "";
          best.textContent = "等待圖片輸入...";
        } else if (mode === 'camera') {
          cameraBtn.classList.add('active');
          uploadBtn.classList.remove('active');
          cameraSection.classList.add('active');
          uploadSection.classList.remove('active');
          startCamera();
        }
      }

      async function startCamera() {
        // 切換前確保先關閉現有的串流
        if (stream) {
          stream.getTracks().forEach(track => track.stop());
        }
        
        try {
          const constraints = { video: { facingMode: facingMode } };
          stream = await navigator.mediaDevices.getUserMedia(constraints);
          video.srcObject = stream;
          video.style.display = 'block';
          preview.innerHTML = '<span class="hint">請點擊「捕捉圖片」開始辨識</span>';
        } catch (error) {
          try {
            // Fallback: 如果無法指定鏡頭，直接請求任意相機
            stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            video.style.display = 'block';
            preview.innerHTML = '<span class="hint">請點擊「捕捉圖片」開始辨識</span>';
          } catch (err) {
            best.textContent = "無法訪問相機: " + err.message;
          }
        }
      }

      function captureImage() {
        if (!video.videoWidth) return;
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0);
        canvas.toBlob((blob) => {
          const file = new File([blob], 'captured.jpg', { type: 'image/jpeg' });
          classifyImage(file);
        }, 'image/jpeg');
      }

      async function classifyImage(file) {
        const img = new Image();
        img.src = URL.createObjectURL(file);
        
        // 必須等待圖片「完全載入」才能清空預覽區並丟給模型
        img.onload = async () => {
          preview.innerHTML = ''; 
          preview.appendChild(img);

          if (!model) {
            pendingFile = file;
            best.textContent = '模型尚未載入，圖片已就緒，載入完成後會自動分類...';
            return;
          }

          try {
            // 模型需要載入完畢的 img 元素
            const prediction = await model.predict(img);
            prediction.sort((a, b) => b.probability - a.probability);
            renderRows(prediction);

            const top = prediction[0];
            const name = labelAlias[top.className] || top.className;
            best.innerHTML =
              '最佳類別: <strong>' + name + '</strong> (' + (top.probability * 100).toFixed(2) + '%)<br>' + recommendation(name);
          } catch (err) {
            best.textContent = '分類失敗: ' + err.message;
          }
        };

        img.onerror = () => {
          preview.innerHTML = '<span class="hint">圖片載入失敗。</span>';
        };
      }

      function recommendation(name) {
        if (name === "電池") return "建議放入有害廢棄物流。";
        if (name === "玻璃") return "放入玻璃回收箱。";
        if (name === "紙板") return "壓平後放入紙板回收。";
        if (name === "金屬") return "放入金屬回收流。";
        return "無路由建議。";
      }

      function renderRows(predictions) {
        results.innerHTML = "";
        predictions.forEach((item) => {
          const row = document.createElement("div");
          row.className = "row";

          const label = document.createElement("span");
          label.textContent = labelAlias[item.className] || item.className;

          const bar = document.createElement("span");
          bar.className = "bar";
          const fill = document.createElement("i");
          fill.style.width = (item.probability * 100).toFixed(2) + "%";
          bar.appendChild(fill);

          const score = document.createElement("span");
          score.textContent = (item.probability * 100).toFixed(1) + "%";

          row.appendChild(label);
          row.appendChild(bar);
          row.appendChild(score);
          results.appendChild(row);
        });
      }

      imageInput.addEventListener("change", (event) => {
        const file = event.target.files[0];
        if (!file) return;
        classifyImage(file);
      });

      uploadBtn.addEventListener('click', () => switchMode('upload'));
      cameraBtn.addEventListener('click', () => switchMode('camera'));
      captureBtn.addEventListener('click', captureImage);
      
      switchCamBtn.addEventListener('click', () => {
        facingMode = facingMode === 'environment' ? 'user' : 'environment';
        startCamera();
      });

      initModel();
    }

    init();
  </script>
</body>
</html>
