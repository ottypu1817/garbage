<!doctype html>
<html lang="zh-tw">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智能垃圾分類器</title>
  <style>
    :root {
      --bg-a: #f7f3ea;
      --bg-b: #dce9d4;
      --ink: #1d2a1a;
      --accent: #226f54;
      --card: rgba(255, 255, 255, 0.8);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 20%, #ffe8c2 0%, transparent 35%),
        radial-gradient(circle at 90% 80%, #b9e1d2 0%, transparent 35%),
        linear-gradient(135deg, var(--bg-a), var(--bg-b));
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .wrap {
      width: min(980px, 100%);
      background: var(--card);
      border: 1px solid rgba(34, 111, 84, 0.2);
      border-radius: 22px;
      padding: 28px;
      backdrop-filter: blur(8px);
      box-shadow: 0 18px 40px rgba(34, 111, 84, 0.15);
      animation: rise 500ms ease-out;
    }
    h1 {
      margin-top: 0;
      font-size: clamp(1.6rem, 4vw, 2.6rem);
      letter-spacing: 0.02em;
    }
    p { line-height: 1.6; }
    .grid {
      margin-top: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }
    .card {
      padding: 18px;
      border-radius: 16px;
      border: 1px solid rgba(29, 42, 26, 0.12);
      background: #fff;
      transition: transform 240ms ease, box-shadow 240ms ease;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 22px rgba(0, 0, 0, 0.1);
    }
    .tag {
      display: inline-block;
      font-size: 0.8rem;
      background: #e6f4ef;
      border-radius: 999px;
      padding: 4px 10px;
      color: var(--accent);
      font-weight: 700;
      margin-bottom: 10px;
    }
    a {
      text-decoration: none;
      color: inherit;
      display: block;
    }
    strong { color: #153f2f; }
    @keyframes rise {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>智能垃圾分類器</h1>
    <p>使用圖像分類模型辨識垃圾材料。上傳照片或使用鏡頭實時辨識，獲取分類結果和回收建議。</p>
    <div class="grid">
      <a class="card" href="app-console.html">
        <span class="tag">生態掃描</span>
        <strong>控制台界面</strong>
        <p>緊湊的儀表板，包含信心條、最佳預測突出顯示和快速推薦面板。支持照片上傳和鏡頭辨識。</p>
      </a>
    </div>
  </main>
</body>
</html>
