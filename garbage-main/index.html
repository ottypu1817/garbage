<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🗑️ 垃圾分類助手 - AI 識別系統</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.0.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8"></script>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🗑️ 垃圾分類助手</h1>
            <p class="subtitle">AI 智能識別垃圾分類</p>
        </header>

        <main class="main-content">
            <!-- 相機模式 -->
            <section class="mode-section">
                <div class="mode-buttons">
                    <button class="mode-btn active" data-mode="camera">📷 相機識別</button>
                    <button class="mode-btn" data-mode="upload">📤 上傳照片</button>
                </div>
            </section>

            <!-- 相機捕捉 -->
            <section id="camera-mode" class="mode-content active">
                <div class="camera-container">
                    <video id="webcam" autoplay playsinline></video>
                    <canvas id="canvas" style="display: none;"></canvas>
                    <div class="camera-overlay">
                        <div class="target-circle"></div>
                        <p class="camera-hint">將垃圾放在中心圓圈內</p>
                    </div>
                </div>
                <div class="camera-controls">
                    <button id="startBtn" class="btn btn-primary">🎥 打開相機</button>
                    <button id="captureBtn" class="btn btn-success" disabled>📸 拍照識別</button>
                    <button id="stopBtn" class="btn btn-danger" disabled>⏹️ 關閉相機</button>
                </div>
            </section>

            <!-- 上傳照片 -->
            <section id="upload-mode" class="mode-content">
                <div class="upload-container">
                    <div class="upload-box" id="uploadBox">
                        <input type="file" id="fileInput" accept="image/*" style="display: none;">
                        <div class="upload-icon">📁</div>
                        <p class="upload-text">點擊或拖拽上傳圖片</p>
                        <p class="upload-hint">支持 JPG、PNG、WebP 等格式</p>
                    </div>
                </div>
                <button id="uploadBtn" class="btn btn-primary">🔍 識別</button>
            </section>

            <!-- 結果顯示 -->
            <section id="results" class="results-section" style="display: none;">
                <div class="result-container">
                    <div id="resultImage" class="result-image"></div>
                    <div class="result-content">
                        <h2 id="resultTitle" class="result-title">識別結果</h2>
                        <div id="classifications" class="classifications"></div>
                        <div id="wasteInfo" class="waste-info"></div>
                    </div>
                </div>
                <button id="resetBtn" class="btn btn-secondary">🔄 重新識別</button>
            </section>

            <!-- 加載狀態 -->
            <div id="loading" class="loading" style="display: none;">
                <div class="spinner"></div>
                <p>正在加載模型和初始化...</p>
            </div>

            <!-- 錯誤提示 -->
            <div id="error" class="error" style="display: none;"></div>
        </main>

        <footer class="footer">
            <p>💚 幫助我們更好地保護環境 | 垃圾分類從我做起</p>
            <p class="version">v1.0 | 由 AI 提供支持</p>
        </footer>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
