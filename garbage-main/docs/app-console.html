<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EcoScan Console</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.7.4/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
  <style>
    :root {
      --bg: #0d1b1e;
      --panel: #132a2f;
      --panel-soft: #19383f;
      --ink: #ecfff6;
      --muted: #9dc8b3;
      --accent: #6dd3a8;
      --warn: #e7b85d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Lucida Console", "Courier New", monospace;
      background:
        linear-gradient(135deg, rgba(109, 211, 168, 0.08), transparent 30%),
        radial-gradient(circle at 85% 15%, rgba(231, 184, 93, 0.12), transparent 25%),
        var(--bg);
      padding: 20px;
    }
    .shell {
      width: min(1080px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 16px;
      animation: enter 480ms ease-out;
    }
    .top {
      background: var(--panel);
      border: 1px solid rgba(109, 211, 168, 0.35);
      border-radius: 14px;
      padding: 16px;
    }
    h1 {
      margin: 0;
      font-size: clamp(1.3rem, 4vw, 2rem);
    }
    .hint { color: var(--muted); margin-top: 8px; }
    .grid {
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 16px;
    }
    .box {
      background: var(--panel);
      border: 1px solid rgba(109, 211, 168, 0.22);
      border-radius: 14px;
      padding: 16px;
    }
    input[type="file"] {
      width: 100%;
      background: var(--panel-soft);
      color: var(--ink);
      border: 1px dashed rgba(109, 211, 168, 0.6);
      border-radius: 10px;
      padding: 10px;
      cursor: pointer;
    }
    .preview {
      margin-top: 14px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(109, 211, 168, 0.35);
      min-height: 220px;
      display: grid;
      place-items: center;
      background: #0f2226;
    }
    .preview img {
      max-width: 100%;
      max-height: 360px;
      object-fit: contain;
      display: block;
    }
    .stat {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }
    .row {
      display: grid;
      grid-template-columns: 88px 1fr 58px;
      gap: 8px;
      align-items: center;
      font-size: 0.9rem;
    }
    .bar {
      height: 10px;
      border-radius: 999px;
      background: #243f45;
      overflow: hidden;
    }
    .bar > i {
      display: block;
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--warn), var(--accent));
      transition: width 300ms ease;
    }
    .best {
      margin-top: 12px;
      border-radius: 10px;
      padding: 12px;
      background: #1a3338;
      border-left: 4px solid var(--accent);
      line-height: 1.5;
    }
    .sub { color: var(--muted); font-size: 0.85rem; margin-top: 12px; }
    a { color: #a7ffd8; }
    @media (max-width: 860px) {
      .grid { grid-template-columns: 1fr; }
    }
    @keyframes enter {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="top">
      <h1>EcoScan Console</h1>
      <div class="hint">Upload one waste-material image and get smart classification scores.</div>
      <div class="sub"><a href="index.html">Back to launcher</a></div>
    </section>

    <section class="grid">
      <article class="box">
        <label for="imageInput">Image Source</label>
        <input id="imageInput" type="file" accept="image/*" />
        <div class="preview" id="preview">
          <span class="hint">No image selected.</span>
        </div>
      </article>

      <article class="box">
        <strong>Classification Panel</strong>
        <div class="stat" id="results"></div>
        <div class="best" id="best">Waiting for model and image input...</div>
      </article>
    </section>
  </main>

  <script>
    const MODEL_URL = "../tm-my-image-model/model.json";
    const METADATA_URL = "../tm-my-image-model/metadata.json";

    const labelAlias = {
      glass: "Glass",
      battery: "Battery",
      cardboard: "Cardboard",
      metal: "Metal"
    };

    let model;
    const imageInput = document.getElementById("imageInput");
    const preview = document.getElementById("preview");
    const results = document.getElementById("results");
    const best = document.getElementById("best");

    async function initModel() {
      try {
        best.textContent = "Loading model...";
        model = await tmImage.load(MODEL_URL, METADATA_URL);
        best.textContent = "Model loaded. Please upload an image.";
      } catch (error) {
        best.textContent = "Model load failed: " + error.message;
      }
    }

    function recommendation(name) {
      if (name === "Battery") return "Hazardous waste stream advised.";
      if (name === "Glass") return "Place in glass recycling bin.";
      if (name === "Cardboard") return "Flatten and place in paper/cardboard recycling.";
      if (name === "Metal") return "Place in metal recycling stream.";
      return "No routing suggestion available.";
    }

    function renderRows(predictions) {
      results.innerHTML = "";
      predictions.forEach((item) => {
        const row = document.createElement("div");
        row.className = "row";

        const label = document.createElement("span");
        label.textContent = labelAlias[item.className] || item.className;

        const bar = document.createElement("span");
        bar.className = "bar";
        const fill = document.createElement("i");
        fill.style.width = (item.probability * 100).toFixed(2) + "%";
        bar.appendChild(fill);

        const score = document.createElement("span");
        score.textContent = (item.probability * 100).toFixed(1) + "%";

        row.appendChild(label);
        row.appendChild(bar);
        row.appendChild(score);
        results.appendChild(row);
      });
    }

    async function classifyImage(file) {
      if (!model) return;

      const img = new Image();
      img.src = URL.createObjectURL(file);
      img.onload = async () => {
        preview.innerHTML = "";
        preview.appendChild(img);

        const prediction = await model.predict(img);
        prediction.sort((a, b) => b.probability - a.probability);
        renderRows(prediction);

        const top = prediction[0];
        const name = labelAlias[top.className] || top.className;
        best.innerHTML =
          "Top class: <strong>" +
          name +
          "</strong> (" +
          (top.probability * 100).toFixed(2) +
          "%)<br>" +
          recommendation(name);
      };
    }

    imageInput.addEventListener("change", (event) => {
      const file = event.target.files[0];
      if (!file) return;
      classifyImage(file);
    });

    initModel();
  </script>
</body>
</html>
