<!doctype html>
<html lang="zh-tw">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>生態掃描控制台</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.7.4/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
  <style>
    :root {
      --bg: #0d1b1e;
      --panel: #132a2f;
      --panel-soft: #19383f;
      --ink: #ecfff6;
      --muted: #9dc8b3;
      --accent: #6dd3a8;
      --warn: #e7b85d;
      --success: #4CAF50;
      --error: #f44336;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Microsoft YaHei", "PingFang SC", "Hiragino Sans GB", sans-serif;
      background:
        linear-gradient(135deg, rgba(109, 211, 168, 0.08), transparent 30%),
        radial-gradient(circle at 85% 15%, rgba(231, 184, 93, 0.12), transparent 25%),
        var(--bg);
      padding: 20px;
    }
    .shell {
      width: min(1080px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 16px;
      animation: enter 480ms ease-out;
    }
    .top {
      background: var(--panel);
      border: 1px solid rgba(109, 211, 168, 0.35);
      border-radius: 14px;
      padding: 16px;
    }
    h1 {
      margin: 0;
      font-size: clamp(1.3rem, 4vw, 2rem);
    }
    .hint { color: var(--muted); margin-top: 8px; }
    .grid {
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 16px;
    }
    .box {
      background: var(--panel);
      border: 1px solid rgba(109, 211, 168, 0.22);
      border-radius: 14px;
      padding: 16px;
    }
    .input-section {
      display: none;
    }
    .input-section.active {
      display: block;
    }
    input[type="file"] {
      width: 100%;
      background: var(--panel-soft);
      color: var(--ink);
      border: 1px dashed rgba(109, 211, 168, 0.6);
      border-radius: 10px;
      padding: 10px;
      cursor: pointer;
    }
    .camera-section {
      text-align: center;
    }
    video {
      width: 100%;
      max-width: 400px;
      border-radius: 12px;
      border: 1px solid rgba(109, 211, 168, 0.35);
    }
    .capture-btn {
      margin-top: 10px;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      cursor: pointer;
      font-size: 1rem;
    }
    .preview {
      margin-top: 14px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(109, 211, 168, 0.35);
      min-height: 220px;
      display: grid;
      place-items: center;
      background: #0f2226;
    }
    .preview img, .preview video {
      max-width: 100%;
      max-height: 360px;
      object-fit: contain;
      display: block;
    }
    .stat {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }
    .row {
      display: grid;
      grid-template-columns: 88px 1fr 58px;
      gap: 8px;
      align-items: center;
      font-size: 0.9rem;
    }
    .bar {
      height: 10px;
      border-radius: 999px;
      background: #243f45;
      overflow: hidden;
    }
    .bar > i {
      display: block;
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--warn), var(--accent));
      transition: width 300ms ease;
    }
    .best {
      margin-top: 12px;
      border-radius: 10px;
      padding: 12px;
      background: #1a3338;
      border-left: 4px solid var(--accent);
      line-height: 1.5;
    }
    .sub { color: var(--muted); font-size: 0.85rem; margin-top: 12px; }
    a { color: #a7ffd8; }
    @media (max-width: 860px) {
      .grid { grid-template-columns: 1fr; }
    }
    @keyframes enter {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="top">
      <h1>生態掃描控制台</h1>
      <div class="hint">上傳垃圾圖片或使用鏡頭辨識，獲取智能分類結果。</div>
      <div class="mode-selector">
        <button class="mode-btn active" id="uploadBtn">照片上傳</button>
        <button class="mode-btn" id="cameraBtn">鏡頭辨識</button>
      </div>
      <div class="sub"><a href="index.html">返回主頁</a></div>
    </section>

    <section class="grid">
      <article class="box">
        <div class="input-section active" id="uploadSection">
          <label for="imageInput">選擇圖片</label>
          <input id="imageInput" type="file" accept="image/*" />
        </div>
        <div class="input-section" id="cameraSection">
          <div class="camera-section">
            <video id="video" autoplay playsinline></video>
            <br>
            <button class="capture-btn" id="captureBtn">捕捉圖片</button>
          </div>
        </div>
        <div class="preview" id="preview">
          <span class="hint">尚未選擇圖片。</span>
        </div>
      </article>

      <article class="box">
        <strong>分類面板</strong>
        <div class="stat" id="results"></div>
        <div class="best" id="best">等待模型和圖片輸入...</div>
      </article>
    </section>
  </main>

  <script>
    const MODEL_URL = "./model/model.json";
    const METADATA_URL = "./model/metadata.json";

    const labelAlias = {
      glass: "玻璃",
      battery: "電池",
      cardboard: "紙板",
      matal: "金屬"
    };

    let model;
    const imageInput = document.getElementById("imageInput");
    const preview = document.getElementById("preview");
    const results = document.getElementById("results");
    const best = document.getElementById("best");
    const uploadBtn = document.getElementById("uploadBtn");
    const cameraBtn = document.getElementById("cameraBtn");
    const uploadSection = document.getElementById("uploadSection");
    const cameraSection = document.getElementById("cameraSection");
    const video = document.getElementById("video");
    const captureBtn = document.getElementById("captureBtn");
    let stream;

    function switchMode(mode) {
      if (mode === 'upload') {
        uploadBtn.classList.add('active');
        cameraBtn.classList.remove('active');
        uploadSection.classList.add('active');
        cameraSection.classList.remove('active');
        if (stream) {
          stream.getTracks().forEach(track => track.stop());
          stream = null;
        }
        video.style.display = 'none';
        preview.innerHTML = '<span class="hint">尚未選擇圖片。</span>';
      } else if (mode === 'camera') {
        cameraBtn.classList.add('active');
        uploadBtn.classList.remove('active');
        cameraSection.classList.add('active');
        uploadSection.classList.remove('active');
        startCamera();
      }
    }

    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
        video.style.display = 'block';
        preview.innerHTML = '';
        preview.appendChild(video);
      } catch (error) {
        best.textContent = "無法訪問相機: " + error.message;
      }
    }

    function captureImage() {
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0);
      canvas.toBlob((blob) => {
        const file = new File([blob], 'captured.jpg', { type: 'image/jpeg' });
        classifyImage(file);
      }, 'image/jpeg');
    }

    async function initModel() {
      try {
        best.textContent = "載入模型中...";
        model = await tmImage.load(MODEL_URL, METADATA_URL);
        best.textContent = "模型載入完成。請上傳圖片或使用鏡頭。";
      } catch (error) {
        best.textContent = "模型載入失敗: " + error.message;
      }
    }

    function recommendation(name) {
      if (name === "電池") return "建議放入有害廢棄物流。";
      if (name === "玻璃") return "放入玻璃回收箱。";
      if (name === "紙板") return "壓平後放入紙板回收。";
      if (name === "金屬") return "放入金屬回收流。";
      return "無路由建議。";
    }

    function renderRows(predictions) {
      results.innerHTML = "";
      predictions.forEach((item) => {
        const row = document.createElement("div");
        row.className = "row";

        const label = document.createElement("span");
        label.textContent = labelAlias[item.className] || item.className;

        const bar = document.createElement("span");
        bar.className = "bar";
        const fill = document.createElement("i");
        fill.style.width = (item.probability * 100).toFixed(2) + "%";
        bar.appendChild(fill);

        const score = document.createElement("span");
        score.textContent = (item.probability * 100).toFixed(1) + "%";

        row.appendChild(label);
        row.appendChild(bar);
        row.appendChild(score);
        results.appendChild(row);
      });
    }

    async function classifyImage(file) {
      if (!model) return;

      const img = new Image();
      img.src = URL.createObjectURL(file);
      img.onload = async () => {
        preview.innerHTML = "";
        preview.appendChild(img);

        const prediction = await model.predict(img);
        prediction.sort((a, b) => b.probability - a.probability);
        renderRows(prediction);

        const top = prediction[0];
        const name = labelAlias[top.className] || top.className;
        best.innerHTML =
          "最佳類別: <strong>" +
          name +
          "</strong> (" +
          (top.probability * 100).toFixed(2) +
          "%)<br>" +
          recommendation(name);
      };
    }

    imageInput.addEventListener("change", (event) => {
      const file = event.target.files[0];
      if (!file) return;
      classifyImage(file);
    });

    uploadBtn.addEventListener('click', () => switchMode('upload'));
    cameraBtn.addEventListener('click', () => switchMode('camera'));
    captureBtn.addEventListener('click', captureImage);

    initModel();
  </script>
</body>
</html>
